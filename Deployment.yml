apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
      - name: ai-agent
        image: your-dockerhub/ai-agent:latest
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          value: "your_api_key"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-service
spec:
  type: NodePort
  selector:
    app: ai-agent
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30007
